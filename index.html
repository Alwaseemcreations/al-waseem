hamburger.addEventListener('click', () => {
mobileMenu.classList.toggle('open');
const spans = hamburger.querySelectorAll('span');
if (mobileMenu.classList.contains('open')) {
spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
spans[1].style.opacity = '0';
spans[2].style.transform = 'rotate(-45deg) translate(5px, -5px)';
} else {
spans[0].style.transform = '';
spans[1].style.opacity = '';
spans[2].style.transform = '';
}
});
// Close mobile menu on link click
document.querySelectorAll('.mobile-link').forEach(link => {
link.addEventListener('click', () => {
mobileMenu.classList.remove('open');
const spans = hamburger.querySelectorAll('span');
spans[0].style.transform = '';
spans[1].style.opacity = '';
spans[2].style.transform = '';
});
});
// ===== SERVICES TABS =====
const tabBtns = document.querySelectorAll('.services-tabs button');
const tabContents = document.querySelectorAll('[data-tab-content]');
tabBtns.forEach(btn => {
btn.addEventListener('click', () => {
const target = btn.dataset.tab;
tabBtns.forEach(b => b.classList.remove('active'));
tabContents.forEach(c => c.classList.remove('active'));
btn.classList.add('active');
document.querySelector(`[data-tab-content="${target}"]`).classList.add('active');
});
});
// ===== NAVBAR SHADOW ON SCROLL =====
const navbar = document.getElementById('navbar');
window.addEventListener('scroll', () => {
if (window.scrollY > 10) {
navbar.style.boxShadow = '0 4px 20px rgba(0,0,0,0.1)';
} else {
navbar.style.boxShadow = '0 2px 12px rgba(0,0,0,0.06)';
}
});
// ===== SCROLL REVEAL (lightweight) =====
const revealEls = document.querySelectorAll('.service-card, .uni-card, .tour-card, .why-card, .pkg-card, .testi-card, .how-step');
const observer = new IntersectionObserver((entries) => {
entries.forEach(entry => {
if (entry.isIntersecting) {
entry.target.style.opacity = '1';
entry.target.style.transform = entry.target.style.transform.replace('translateY(20px)', 'translateY(0)');
observer.unobserve(entry.target);
}
});
}, { threshold: 0.1 });
revealEls.forEach(el => {
el.style.opacity = '0';
el.style.transform = (el.style.transform || '') + ' translateY(20px)';
el.style.transition = 'opacity 0.45s ease, transform 0.45s ease';
observer.observe(el);
});
</script>
</body>
</html>
