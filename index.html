<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Waseem Global Solutions | Premium Travel & Student Admissions</title>
    
    <!-- Premium Typography and Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --color-primary: #042416;     /* Deep Luxury Forest Green */
            --color-accent: #c4a474;      /* Premium Gold */
            --color-dark: #02120b;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: #ffffff;
            color: #334155;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- NAVIGATION --- */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-sans);
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--color-accent);
            letter-spacing: 2px;
        }

        nav {
            display: none;
        }

        @media (min-width: 992px) {
            nav {
                display: flex;
                gap: 2rem;
            }
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0.9;
            transition: opacity 0.3s;
        }

        nav a:hover {
            opacity: 1;
            color: var(--color-accent);
        }

        .btn-started {
            background: transparent;
            border: 1px solid var(--color-accent);
            color: #ffffff;
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-started:hover {
            background: var(--color-accent);
            color: var(--color-primary);
        }

        /* --- HERO SECTION (Egypt Pyramid Sunset Background) --- */
        .hero {
            position: relative;
            min-height: 85vh;
            background: linear-gradient(rgba(4, 36, 22, 0.75), rgba(4, 36, 22, 0.55)), url('https://images.unsplash.com/photo-1503177119275-0aa32b3a9368?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 5% 6rem;
        }

        .hero-subtitle {
            color: var(--color-accent);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .hero-title {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            color: #ffffff;
            max-width: 900px;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        @media (min-width: 768px) {
            .hero-title { font-size: 4.2rem; }
        }

        .hero-line {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: #ffffff;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .hero-line::before, .hero-line::after {
            content: "";
            display: block;
            width: 40px;
            height: 1px;
            background: var(--color-accent);
        }

        /* --- FLOATING INQUIRY BAR --- */
        .floating-container {
            width: 90%;
            max-width: 1100px;
            margin: -4rem auto 0;
            position: relative;
            z-index: 5;
        }

        .floating-bar {
            background: #ffffff;
            border-radius: 100px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
            padding: 0.75rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .bar-item {
            flex: 1;
            min-width: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 0.5rem;
            border-right: 1px solid #e2e8f0;
        }

        .bar-item:nth-last-child(2) {
            border-right: none;
        }

        .bar-item i {
            color: var(--color-primary);
            font-size: 1.4rem;
            margin-bottom: 0.4rem;
        }

        .bar-item span {
            font-size: 0.85rem;
            font-weight: 600;
            color: #1e293b;
        }

        .btn-inquiry {
            background: var(--color-primary);
            color: #ffffff;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: background 0.3s;
        }

        .btn-inquiry i {
            color: var(--color-accent);
            font-size: 1rem;
        }

        .btn-inquiry:hover {
            background: #063621;
        }

        @media (max-width: 991px) {
            .floating-bar { border-radius: 24px; padding: 1.5rem; justify-content: center; gap: 1rem; }
            .bar-item { border-right: none; border-bottom: 1px solid #e2e8f0; width: 45%; flex: none; padding-bottom: 1rem; }
            .bar-item:nth-last-child(2) { border-bottom: none; }
            .bar-item:nth-last-child(3) { border-bottom: none; }
            .btn-inquiry { width: 95%; margin: 0.5rem auto 0; padding: 1rem 2rem; border-radius: 50px; }
        }

        /* --- ABOUT SECTION (Nile Cruise Water Frame) --- */
        .about-section {
            padding: 10rem 5% 5rem;
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 4rem;
            align-items: center;
        }

        @media (min-width: 992px) {
            .about-section { grid-template-columns: 1fr 1fr; padding-top: 8rem; }
        }

        .section-tag {
            color: var(--color-accent);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .section-tag::after {
            content: "";
            width: 30px;
            height: 1px;
            background: var(--color-accent);
        }

        .about-title {
            font-family: var(--font-serif);
            font-size: 2.4rem;
            color: var(--color-primary);
            line-height: 1.2;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .about-text {
            color: #475569;
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }

        .about-images {
            position: relative;
            display: flex;
            justify-content: center;
        }

        .circle-frame {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            border: 2px solid var(--color-accent);
            padding: 8px;
        }

        @media (min-width: 480px) {
            .circle-frame { width: 380px; height: 380px; }
        }

        .circle-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .badge-trusted {
            position: absolute;
            bottom: 10px;
            right: 20px;
            width: 120px;
            height: 120px;
            background: var(--color-primary);
            border: 2px solid var(--color-accent);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 10px;
            color: #ffffff;
            font-size: 0.8rem;
            font-weight: 600;
        }

        @media (min-width: 480px) {
            .badge-trusted { right: 40px; width: 130px; height: 130px; font-size: 0.85rem; }
        }

        .badge-trusted i {
            color: var(--color-accent);
            font-size: 1.4rem;
            margin-bottom: 0.3rem;
        }

        /* --- SERVICES SECTION --- */
        .services-section {
            background-color: #fafafa;
            padding: 6rem 5%;
            text-align: center;
        }

        .services-header {
            margin-bottom: 4rem;
        }

        .services-header h2 {
            font-family: var(--font-serif);
            font-size: 2.6rem;
            color: var(--color-primary);
            font-weight: 500;
            margin-top: 0.5rem;
        }

        .services-header h2::after {
            content: "";
            display: block;
            width: 50px;
            height: 2px;
            background: var(--color-accent);
            margin: 0.75rem auto 0;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .service-card {
            background: #ffffff;
            padding: 3rem 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            transition: transform 0.3s;
        }

        .service-card:hover {
            transform: translateY(-5px);
        }

        .service-icon-box {
            width: 70px;
            height: 70px;
            background: transparent;
            border: 2px solid var(--color-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .service-icon-box i {
            color: var(--color-primary);
            font-size: 1.8rem;
        }

        .service-card h3 {
            font-family: var(--font-serif);
            font-size: 1.35rem;
            color: var(--color-primary);
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .service-card p {
            color: #64748b;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        /* --- NEW: UNIVERSITY PLACEMENT HUB --- */
        .uni-section {
            padding: 6rem 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .uni-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .uni-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
        }

        .uni-img-box {
            height: 200px;
            width: 100%;
            position: relative;
        }

        .uni-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .uni-content {
            padding: 2rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .uni-content h3 {
            font-family: var(--font-serif);
            color: var(--color-primary);
            font-size: 1.4rem;
            margin-bottom: 0.75rem;
        }

        .uni-content p {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .btn-uni-ask {
            background: transparent;
            border: 2px solid var(--color-primary);
            color: var(--color-primary);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }

        .btn-uni-ask:hover {
            background: var(--color-primary);
            color: #ffffff;
        }

        /* --- TOURS & ADVENTURE EXPERIENCE MATRIX --- */
        .destinations-section {
            background: #fafafa;
            padding: 6rem 5%;
        }

        .dest-wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }

        .destinations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .dest-card {
            position: relative;
            height: 340px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            cursor: pointer;
        }

        .dest-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .dest-card:hover img {
            transform: scale(1.08);
        }

        .dest-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(4, 36, 22, 0.85));
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 2rem;
            color: #ffffff;
        }

        .dest-overlay h4 {
            font-family: var(--font-serif);
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .dest-overlay p {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 1rem;
            color: var(--color-accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .dest-action {
            font-size: 0.85rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* --- INTEGRATED CALL TO ACTION BAR --- */
        .cta-bar {
            background-color: var(--color-primary);
            color: #ffffff;
            padding: 4rem 8%;
            max-width: 1200px;
            margin: 0 auto;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 3rem;
            position: relative;
            bottom: -2rem;
            z-index: 2;
        }

        @media (min-width: 992px) {
            .cta-bar { flex-direction: row; justify-content: space-between; align-items: center; bottom: -4rem; }
        }

        .cta-left h2 {
            font-family: var(--font-serif);
            font-size: 2.2rem;
            color: var(--color-accent);
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        .cta-left p {
            opacity: 0.8;
            font-size: 1rem;
            max-width: 500px;
        }

        .cta-right {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .contact-icon {
            width: 45px;
            height: 45px;
            background: rgba(196, 164, 116, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-accent);
            font-size: 1.1rem;
        }

        .contact-info span {
            display: block;
            font-size: 0.75rem;
            opacity: 0.6;
        }

        .contact-info a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
        }

        .btn-cta-connect {
            background: var(--color-accent);
            color: var(--color-primary);
            padding: 0.8rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
            transition: background 0.3s;
        }

        .btn-cta-connect:hover {
            background: #b59567;
        }

        /* --- FOOTER (Zero Gap Alignment) --- */
        footer {
            background: var(--color-dark);
            color: #ffffff;
            padding: 6rem 5% 2rem;
            border-top: 1px solid rgba(196, 164, 116, 0.1);
        }

        @media (min-width: 992px) {
            footer { padding-top: 8rem; }
        }

        .footer-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 3rem;
            padding-bottom: 3rem;
        }

        .footer-col h3 {
            font-family: var(--font-serif);
            font-size: 1.1rem;
            letter-spacing: 1px;
            margin-bottom: 1.2rem;
            color: #ffffff;
        }

        .footer-col p {
            font-size: 0.85rem;
            opacity: 0.6;
            line-height: 1.8;
            max-width: 300px;
        }

        .social-links {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .social-links a {
            width: 36px;
            height: 36px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .social-links a:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
        }

        .footer-links {
            list-style: none;
        }

        .footer-links li {
            margin-bottom: 0.6rem;
        }

        .footer-links a {
            color: #ffffff;
            opacity: 0.6;
            text-decoration: none;
            font-size: 0.85rem;
            transition: opacity 0.3s;
        }

        .footer-links a:hover {
            opacity: 1;
            color: var(--color-accent);
        }

        .footer-bottom {
            max-width: 1200px;
            margin: 0 auto;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 2rem;
            text-a
